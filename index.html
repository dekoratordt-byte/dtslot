<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DT Casino Royale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:wght@700&family=Goldman&display=swap');

        :root {
            --casino-red: #8b0000;
            --gold-gradient: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --dark-velvet: radial-gradient(circle, #2c0000 0%, #000000 100%);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--dark-velvet);
            color: #fff;
            font-family: 'Playfair Display', serif;
            position: fixed; /* iPhone kaydırmayı önlemek için */
            touch-action: none;
        }

        /* Yönlendirme Uyarısı (Dikey modda görünür) */
        #orientationOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        @media (orientation: portrait) {
            #orientationOverlay { display: flex; }
        }

        .rotate-icon {
            width: 80px;
            height: 80px;
            border: 4px solid #bf953f;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: rotateDevice 2s infinite;
        }

        @keyframes rotateDevice {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
            100% { transform: rotate(0deg); }
        }

        /* Başlangıç Ekranı */
        #startOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
        }

        .start-btn {
            background: var(--gold-gradient);
            color: #000 !important;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 2rem;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(191, 149, 63, 0.6);
            border: 4px solid #554400;
            transition: transform 0.2s;
        }

        .start-btn:active { transform: scale(0.9); }

        /* Ana Konteyner */
        .casino-container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 1s;
        }

        .machine-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .slot-machine {
            background: #1a1a1a;
            border: clamp(5px, 1.5vw, 10px) solid #bf953f;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px rgba(0,0,0,0.5);
            flex-grow: 1;
            z-index: 2;
            position: relative;
        }

        .slot-header {
            font-family: 'Cinzel', serif;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            font-size: clamp(1rem, 3.5vw, 1.8rem);
            margin-bottom: 10px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        .reel-window {
            background: #000;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            padding: 10px;
            border-radius: 10px;
            border: 3px solid #333;
            margin-bottom: 15px;
        }

        .reel {
            height: clamp(50px, 18vh, 120px);
            background: #fff;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.8rem, 8vw, 4rem);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            color: #000;
            font-weight: bold;
        }

        .reel.locked {
            animation: flashGold 0.5s ease;
            box-shadow: inset 0 0 15px #bf953f;
        }

        @keyframes flashGold {
            0% { filter: brightness(2); }
            100% { filter: brightness(1); }
        }

        /* Lever / Kol */
        .lever-track {
            width: clamp(30px, 5vw, 45px);
            height: clamp(140px, 40vh, 220px);
            background: #111;
            border: 3px solid #bf953f;
            border-radius: 20px;
            position: relative;
            margin-left: -15px;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.7);
            background-image: linear-gradient(to right, #000, #333, #000);
        }

        .lever-handle {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30%;
            height: 60%;
            background: linear-gradient(to right, #444, #eee, #444);
            border-radius: 10px;
            transform-origin: bottom center;
            transition: transform 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            cursor: pointer;
        }

        .lever-knob {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: clamp(40px, 8vw, 60px);
            height: clamp(40px, 8vw, 60px);
            background: radial-gradient(circle at 30% 30%, #ff3333, #660000);
            border-radius: 50%;
            border: 3px solid #bf953f;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .pulling .lever-handle {
            transform: translateX(-50%) rotateX(150deg);
        }

        /* Butonlar */
        .auto-btn-wrapper { margin-right: -15px; z-index: 10; }
        .auto-btn {
            background: linear-gradient(180deg, #4b0082 0%, #1a0033 100%);
            border: 2px solid #bf953f;
            color: #bf953f;
            font-family: 'Goldman', cursive;
            padding: clamp(15px, 4vh, 25px) 8px;
            border-radius: 15px 0 0 15px;
            cursor: pointer;
            writing-mode: vertical-rl;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            box-shadow: -5px 0 15px rgba(0,0,0,0.7);
        }
        .auto-btn.active { background: #00ff00; color: #000; box-shadow: 0 0 20px #00ff00; }

        .casino-btn {
            background: var(--gold-gradient);
            border: 2px solid #554400;
            color: #000 !important;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            padding: 12px 30px; /* Daha tok görünüm */
            border-radius: 50px; /* Her zaman yuvarlak/kapsül */
            width: fit-content; /* Yatayda uzamaması için */
            min-width: 150px; /* Çok küçülmemesi için */
            margin: 0 auto; /* Merkezlemek için */
            display: block;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            cursor: pointer;
            box-shadow: 0 4px 0 #443300;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .casino-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #443300;
        }

        .casino-btn:disabled {
            background: #444;
            color: #888 !important;
            border-color: #222;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .win-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            border: 5px solid #bf953f;
            padding: 30px 50px;
            border-radius: 20px;
            z-index: 1000;
            display: none;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 0 100px #bf953f;
            pointer-events: none;
        }

        .stat-box {
            background: #111;
            border: 2px solid #bf953f;
            padding: 5px 15px;
            border-radius: 8px;
            min-width: 100px;
        }

        .gold-text { color: #bf953f; font-family: 'Goldman', cursive; font-size: 1.2rem; }

        /* Mobil Optimizasyon */
        @media (max-height: 450px) {
            .slot-header { display: none; }
            .reel-window { margin-bottom: 5px; padding: 5px; }
            .casino-btn { 
                padding: 8px 20px; 
                font-size: 0.8rem; 
                min-width: 120px;
            }
            .machine-wrapper { transform: scale(0.95); }
        }
    </style>
</head>
<body>

    <!-- Döndürme Uyarısı -->
    <div id="orientationOverlay">
        <div class="rotate-icon"></div>
        <h2 class="text-[#bf953f] text-2xl font-serif">LÜTFEN CİHAZI DÖNDÜRÜN</h2>
        <p class="text-gray-400 mt-2">Daha iyi bir kumar deneyimi için yatay mod gereklidir.</p>
    </div>

    <!-- Başlangıç Ekranı -->
    <div id="startOverlay">
        <h1 class="text-4xl text-[#bf953f] mb-8 font-serif uppercase tracking-widest px-4" style="font-family: 'Cinzel', serif;">DT Casino Royale</h1>
        <button class="start-btn" onclick="initGame()">OYUNA GİR</button>
        <p class="mt-8 text-gray-500 text-sm italic">"Kasanın her zaman kazandığını unutma."</p>
    </div>

    <!-- Kazanç Bildirimi -->
    <div id="winMsg" class="win-overlay">
        <h2 class="text-5xl text-yellow-500 font-serif mb-2" style="font-family: 'Cinzel', serif;">JACKPOT!</h2>
        <div class="h-1 w-full bg-yellow-500 mb-4"></div>
        <p class="text-2xl text-white">+10 KREDİ KAZANDIN</p>
    </div>

    <div class="casino-container" id="gameUI">
        <div class="flex flex-col gap-3 items-center justify-center w-full h-full">
            
            <!-- Üst Panel -->
            <div class="flex flex-row gap-4 items-center justify-center w-full">
                <div class="stat-box">
                    <div class="text-[10px] text-gray-400">BAKİYE</div>
                    <div id="creditDisplay" class="gold-text">0</div>
                </div>

                <div class="flex items-center gap-2 bg-black/50 p-2 rounded-lg border border-gray-800">
                    <input type="number" id="loadInput" value="100" class="bg-black border border-[#bf953f] text-white w-16 text-center rounded">
                    <button onclick="addCredits()" class="bg-[#bf953f] text-black px-3 py-1 rounded font-bold uppercase text-[10px]">YÜKLE</button>
                </div>
            </div>

            <!-- Makine -->
            <div class="machine-wrapper">
                <div class="auto-btn-wrapper">
                    <button id="autoSpinBtn" class="auto-btn">OTOMATİK SPIN</button>
                </div>

                <div class="slot-machine">
                    <div class="slot-header">CASINO ROYALE</div>
                    <div class="reel-window">
                        <div class="reel" id="reel-0">7</div>
                        <div class="reel" id="reel-1">7</div>
                        <div class="reel" id="reel-2">7</div>
                        <div class="reel" id="reel-3">7</div>
                    </div>
                    <!-- Güncellenen Durdur Butonu -->
                    <button id="stopBtn" class="casino-btn" disabled>DURDUR</button>
                    <p id="autoStatus" class="text-[9px] text-center text-gray-500 mt-2">Bahis: 5 | Ödül: 10</p>
                </div>

                <div class="lever-track" id="leverTrack">
                    <div class="lever-handle" id="leverHandle">
                        <div class="lever-knob"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const symbols = ['♠', '♥', '♦', '♣', 'A', 'K', 'Q', 'J'];
        
        function getSymbolColor(sym) {
            return (sym === '♥' || sym === '♦') ? '#ff0000' : '#000000';
        }

        let credits = 0;
        let stoppedCount = 0;
        let spinning = false;
        let leverBusy = false;
        let spinCountInCycle = 0;
        let winningSpinIndex = Math.floor(Math.random() * 20);
        let plannedWin = false;
        let winSymbol = '';
        let isAutoMode = false;
        let autoSpinRemaining = 0;

        const reels = [0,1,2,3].map(i => document.getElementById(`reel-${i}`));
        const stopBtn = document.getElementById('stopBtn');
        const autoSpinBtn = document.getElementById('autoSpinBtn');
        const leverTrack = document.getElementById('leverTrack');
        const creditDisplay = document.getElementById('creditDisplay');
        const winMsg = document.getElementById('winMsg');
        const autoStatus = document.getElementById('autoStatus');

        let slotState = Array(4).fill(0).map(() => ({ active: false, value: '' }));

        async function initGame() {
            window.scrollTo(0, 1); 
            
            try {
                const doc = document.documentElement;
                if (doc.requestFullscreen) await doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) await doc.webkitRequestFullscreen();
                
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape').catch(() => {});
                }
            } catch (e) {}

            document.getElementById('startOverlay').style.display = 'none';
            document.getElementById('gameUI').style.opacity = '1';
        }

        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        function addCredits() {
            const val = parseInt(document.getElementById('loadInput').value);
            if (val > 0) {
                credits += val;
                updateUI();
            }
        }

        autoSpinBtn.addEventListener('click', () => {
            if (isAutoMode) stopAutoMode();
            else {
                if (credits < 5) { customMessage("Yetersiz Kredi!"); return; }
                startAutoMode();
            }
        });

        function startAutoMode() {
            isAutoMode = true;
            autoSpinRemaining = 20;
            autoSpinBtn.classList.add('active');
            autoSpinBtn.innerText = "DURDUR";
            triggerPull();
        }

        function stopAutoMode() {
            isAutoMode = false;
            autoSpinRemaining = 0;
            autoSpinBtn.classList.remove('active');
            autoSpinBtn.innerText = "OTOMATİK SPIN";
            autoStatus.innerText = "Bahis: 5 | Ödül: 10";
        }

        const handle = document.getElementById('leverHandle');
        const triggerPull = () => {
            if (leverBusy || spinning) return;
            if (credits < 5) {
                customMessage("Yetersiz Kredi!");
                stopAutoMode();
                return;
            }

            leverBusy = true;
            leverTrack.classList.add('pulling');

            setTimeout(() => {
                leverTrack.classList.remove('pulling');
                credits -= 5;
                updateUI();
                
                if (spinCountInCycle === winningSpinIndex) {
                    plannedWin = true;
                    winSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                } else {
                    plannedWin = false;
                }

                spinCountInCycle++;
                if (spinCountInCycle >= 20) {
                    spinCountInCycle = 0;
                    winningSpinIndex = Math.floor(Math.random() * 20);
                }
                
                startSpinning();
                leverBusy = false;

                if (isAutoMode) {
                    autoStatus.innerText = `OTO TUR: ${21 - autoSpinRemaining}/20`;
                    setTimeout(autoStopReels, 1200);
                }
            }, 600);
        };

        function autoStopReels() {
            if (!isAutoMode || !spinning) return;
            let i = 0;
            const interval = setInterval(() => {
                if (i < 4) { stopSingleReel(i); i++; }
                else clearInterval(interval);
            }, 400);
        }

        function stopSingleReel(index) {
            if (slotState[index].active) {
                slotState[index].active = false;
                if (plannedWin) {
                    reels[index].innerText = winSymbol;
                    reels[index].style.color = getSymbolColor(winSymbol);
                    slotState[index].value = winSymbol;
                }
                reels[index].classList.add('locked');
                stoppedCount++;

                if (stoppedCount === 4) {
                    spinning = false;
                    stopBtn.disabled = true;
                    checkWin();
                    
                    if (isAutoMode) {
                        autoSpinRemaining--;
                        if (autoSpinRemaining > 0 && credits >= 5) {
                            setTimeout(triggerPull, 1500);
                        } else {
                            stopAutoMode();
                        }
                    }
                }
            }
        }

        handle.addEventListener('mousedown', triggerPull);
        handle.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerPull();
        });

        function startSpinning() {
            stoppedCount = 0;
            spinning = true;
            stopBtn.disabled = isAutoMode;
            winMsg.style.display = 'none';
            slotState.forEach((s, i) => {
                s.active = true;
                reels[i].classList.remove('locked');
            });
        }

        stopBtn.addEventListener('click', () => {
            if (stoppedCount < 4 && spinning) stopSingleReel(stoppedCount);
        });

        function checkWin() {
            const first = slotState[0].value;
            const isWin = slotState.every(s => s.value === first);
            
            if (isWin) {
                credits += 10;
                updateUI();
                winMsg.style.display = 'block';

                confetti({
                    particleCount: 200,
                    spread: 90,
                    origin: { y: 0.5 },
                    colors: ['#bf953f', '#fcf6ba', '#ff0000', '#ffffff']
                });

                setTimeout(() => winMsg.style.display = 'none', 4000);
            }
        }

        function updateUI() {
            creditDisplay.innerText = credits;
        }

        function customMessage(txt) {
            const m = document.createElement('div');
            m.className = "fixed top-10 bg-red-600 text-white px-8 py-3 rounded-full z-[9999] font-bold shadow-2xl border-2 border-white";
            m.style.left = "50%";
            m.style.transform = "translateX(-50%)";
            m.innerText = txt;
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 2500);
        }

        function gameLoop() {
            slotState.forEach((s, i) => {
                if (s.active) {
                    const sym = symbols[Math.floor(Math.random() * symbols.length)];
                    reels[i].innerText = sym;
                    reels[i].style.color = getSymbolColor(sym);
                    s.value = sym;
                }
            });
            requestAnimationFrame(gameLoop);
        }
        gameLoop();

        window.addEventListener('scroll', () => {
            if (window.scrollY !== 0) window.scrollTo(0, 0);
        });
    </script>
</body>
</html>
